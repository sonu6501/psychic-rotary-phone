services:
  - type: web
    name: black-devil-trading-bot
    env: python
    region: singapore # आप oregon या frankfurt भी रख सकते हैं
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
